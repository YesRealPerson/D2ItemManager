<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title>Loadout Manager</title>
        <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
        <script>
            var d2id;
            var currentChar = "none";
            var classes = ["Titan", "Hunter", "Warlock"];
            function setCurrent(char, classType){
                var selectors = document.getElementsByClassName("selector");
                for(var i = 0; i < selectors.length; i++){
                    if(selectors[i].id == char){
                        selectors[i].style.borderColor = "rgb(150,20,20)";
                    }else if(selectors[i].id != "refresh"){
                        selectors[i].style.borderColor = "white";
                    }
                }
                currentChar = char;
                document.getElementById("select").innerHTML = classType;
            }
            const params = new Proxy(new URLSearchParams(window.location.search), {
                get: (searchParams, prop) => searchParams.get(prop),
            });
            let value = params.user;
            fetch("/?user="+value+".profile.json&type=1")
            .then((response) => {
                if (response.ok) {
                    return response.text();
            } else {
                throw new Error("NETWORK RESPONSE ERROR");
            }}).then(data => {
                document.getElementById("name").innerHTML = JSON.parse(data).name;
            });
            
            //fetch username
            fetch("/?user="+value+".profile.json&type=1")
            .then((response) => {
                if (response.ok) {
                    return response.text();
            } else {
                throw new Error("NETWORK RESPONSE ERROR");
            }}).then(data => {
                var id = JSON.parse(data).membershipId;
                d2id = id;
                var chars = JSON.parse(data).classes;
                for(character in chars){
                    character = chars[character];  
                    classType = classes[character.classType];
                    charID = character.charId;
                    var equip = document.getElementsByClassName('equip');
                    for(var i = 0; i < equip.length; i++){
                        var charDiv = document.createElement('div');
                        charDiv.id = charID+""+equip[i].parentElement.id;
                        charDiv.innerHTML = " ";
                        equip[i].prepend(charDiv);
                    }
                    var charButton = document.createElement('button');
                    charButton.setAttribute("onclick",`setCurrent( "${charID}","${classType}")`);
                    charButton.innerText = classType;
                    charButton.setAttribute("class","selector");
                    charButton.setAttribute("id",charID);
                    charButton.style.backgroundImage = 'url("https://bungie.net'+character.emblem+'")';
                    charButton.style.backgroundSize = 'contain'
                    charButton.style.maxWidth = "320px";
                    charButton.style.height = "66px";
                    charButton.style.textAlign = "left";
                    charButton.style.paddingLeft = "90px";
                    document.getElementById("characters").prepend(charButton);
                }
                chars = JSON.stringify(chars);
                fetch("/?user="+id+".vault.json&type=1")
                .then((response) => {
                if (response.ok) {
                    return response.text();
                } else {
                    throw new Error("NETWORK RESPONSE ERROR");
                }}).then(data => {
                    var vault = JSON.parse(data);
                    refresh(vault, id);
                });
            });
            function refresh(vault, profile){
                vault = vault.data;
                for(var i = 0; i < vault.length; i++){
                    var key = Object.keys(vault[i])[0];
                        var type = vault[i][key].type;
                        var icon = vault[i][key].icon;
                        var rarity = vault[i][key].rarity;
                        var location = vault[i][key].location =="vault";
                        var currentLocation = vault[i][key].location;
                        try{
                            rarity = rarity.split(" ")[0];
                        }catch{
                            rarity = "undefined";
                        }
                        let add = document.createElement('img');
                        add.setAttribute("src",icon);

                        let button = document.createElement('button');
                        var h = vault[i][key].itemHash;
                        console.log(vault[i][key]);
                        button.setAttribute("onclick",`transferItem( "${h}","${1}","${!location}","${key}","${3}","${currentLocation}","${i}","${profile}","${vault[i][key].name}" )`);
                        console.log(button.attributes);
                        button.appendChild(add);

                        let div = document.createElement('div');
                        div.setAttribute("class","hoverwrap "+currentLocation+" "+i+" "+rarity);
                        div.setAttribute("id",key);

                        let caption = document.createElement('div');
                        caption.setAttribute("class","hovercap");
                        caption.innerText = vault[i][key].name;

                        let hover = document.createElement('div');
                        hover.setAttribute("class","darken");

                        try{
                            rarity = rarity.split(" ")[0];
                        }catch{
                            rarity = "undefined";
                        }

                        try{
                            if(!location){
                                document.getElementById(currentLocation+""+type).appendChild(div);
                            }else{
                                document.getElementById(type).children[1].appendChild(div);
                            }
                        }catch{
                            document.getElementById("vault").appendChild(div);
                        }
                        document.getElementById(key).appendChild(button);
                        document.getElementById(key).appendChild(caption);
                        document.getElementById(key).appendChild(hover);
                    }
            }
            function refreshVault(){
                fetch("/refresh?id="+d2id).then((response) => {
                    
                fetch("/?user="+value+".profile.json&type=1")
                .then((response) => {
                    if (response.ok) {
                        return response.text();
                } else {
                    throw new Error("NETWORK RESPONSE ERROR");
                }}).then(data => {
                    var id = JSON.parse(data).membershipId;
                    fetch("/?user="+id+".vault.json&type=1")
                    .then((response) => {
                    if (response.ok) {
                        return response.text();
                    } else {
                        throw new Error("NETWORK RESPONSE ERROR");
                    }}).then(data => {
                        var temp = document.getElementsByClassName("inventory");
                        for(var i = 0; i < temp.length; i++){
                            temp[i].innerHTML = "";
                        }
                        temp = document.getElementsByClassName("equip");
                        for(var i = 0; i < temp.length; i++){
                            var children = temp[i].children;
                            for(var j = 0; j < children.length; j++){
                                while(children[j].lastChild){
                                    children[j].removeChild(children[j].lastChild);
                                }
                            }
                        }
                        var vault = JSON.parse(data);
                        refresh(vault, d2id);
                    });
                });
            });
            }

            async function transferItem(hash, stack, vault, instance, membership, currentLocation, number, profile, name){
                if(document.getElementById(instance+"status") == null){
                var status = document.getElementById("status");
                vault = vault =="true";
                var message = document.createElement("p");
                var random = instance+"status";
                message.innerHTML = "Attempting transfer of "+name;
                message.setAttribute("id", random);
                message.style.border = "1px solid white"
                message.style.backgroundColor = "rgba(0,0,0,0.5)"
                message.style.paddingTop = "10px";
                message.style.paddingBottom = "10px";
                message.style.margin = "5px";
                message.style.pointerEvents = "none";
                status.appendChild(message);
                if(currentChar=="none"){
                    document.getElementById(random).innerHTML = "Select a character!"
                    await new Promise(r => setTimeout(r, 2500));
                    document.getElementById(random).remove();
                }else{
                    var charToMove = currentChar;
                    if(vault){
                        charToMove = currentLocation;
                    }
                    fetch("/moveitem?hash="+hash+"&stack="+stack+"&vault="+vault+"&instance="+instance+"&currentChar="+charToMove+"&membership="+membership+"&id="+value)
                    .then(async (response) => {
                        if(response.ok){
                            console.log("Success: transfer item");
                            console.log(vault);
                            if(vault){
                                vault = "false";
                                charLocation = "vault";
                            }else{
                                vault ="true";
                                charLocation = charToMove;
                            }
                            document.getElementById(instance).firstChild.setAttribute("onclick",`transferItem( "${hash}","${1}","${vault}","${instance}","${3}","${charToMove}","${number}","${profile}","${name}" )`);
                            var temp = document.getElementById(instance);
                            temp.className = "hoverwrap "+charLocation+" "+number;
                            var sibling = document.getElementById(instance).parentElement.className == "inventory";
                            var grandparent = document.getElementById(instance).parentElement.parentElement;
                            var type = grandparent.id;
                            document.getElementById(instance).remove();
                            if(sibling){
                                document.getElementById(charLocation+type).appendChild(temp);
                            }else{
                                grandparent.parentElement.lastChild.previousSibling.appendChild(temp);
                            }

                            fetch("/updatevault?number="+number+"&profile="+d2id+"&vault="+vault+"&location="+charToMove);
                            
                            //display message
                            document.getElementById(random).innerHTML = "Successful transfer!"
                            await new Promise(r => setTimeout(r, 2500));
                            document.getElementById(random).remove();
                        }else{
                            console.log("Failure: "+response.statusText);
                            
                            document.getElementById(random).innerHTML = response.statusText;
                            await new Promise(r => setTimeout(r, 2500));
                            document.getElementById(random).remove();
                        }
                    });
                }
            }
            }
        </script>
        <style>
#Kinetic, #Energy, #Power, #Helmet, #Gauntlets, #Chest, #Legs, #Class{
    display: grid;
    grid-template-columns: 1000px auto;
}
.equip{
    grid-column: 1/2;
    display: grid;
    grid-template-columns: 320px 320px 320px;
    padding-right: 10px;
    max-width: 1000px;
}
.inventory{
    min-width: 320px;
    grid-column: 2/3;
}
#overlayImg{
    position:relative;
    transform: scale(50%);
}

body{
    color:white;
    background-color: #181a1b;
    text-align: center;
    font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
}

h1, h3{
    margin: 5px;
}

.selector{
    border: 1px solid white;
    color: white;
    background-color: rgba(0,0,0,0);
    margin: 5px;
    margin-left: 0px;
    padding: 5px;;
}

button{
    margin: 0px;
    padding: 0px;
    border-width: 0px;
    border: 0px;
    background-color: #181a1b;
}

.hoverwrap {
    float: left;
    transform: scale(100%);
}

.hoverwrap img { 
    height: 100px;
    width: 100%; 
}

.hovercap {
    pointer-events: none;
    font-size: 15px;
    box-sizing: border-box;
    width: 100%;
    padding: 10px;
    position: absolute;
    bottom: 0; left: 0;
    background-color: rgba(0, 0, 0, 0.5);
    color: white;
}
.darken{
    pointer-events: none;
    box-sizing: border-box;
    width: 100%;
    height: 100%;
    padding: 10px;
    position: absolute;
    bottom: 0; left: 0;
}
.hoverwrap:hover .darken {
    background-color: rgba(0,0,0,0.5);
}
.hoverwrap:hover .hovercap {
    background-color: rgba(0,0,0,0);
}
#characters{
    display: grid;
    grid-template-columns: 320px 320px 320px auto;
}
#characters *{
    color: white;
    background-color: rgb(50, 50, 50);
    font-size: 30px;
}
#status{
    position: fixed;
    z-index: 10;
    top: 50px;
    right: 50px;
    opacity: 100;
    color: white;
    font-size: 25px;
    width: 500px;
}
#top{
    display: grid;
    grid-template-columns: 9fr 1fr;
}
#top > *{
    text-align: left;
    padding-left: 50px;
    padding-right: 50px;
    margin-right: 50px;
    margin-left: 50px;
}
#refresh{
    font-size: 25px;
    background-color: rgba(0, 0, 0, 0.5);
}
#current, #current *{
    text-align: center;
    background-color: rgba(0,0,0,0);
}
        
        </style>
    </head>
    <body>
        <div id="top">
            <h1>Welcome, <span id="name"></span></h1>
            <button class="selector" id="refresh" onclick="refreshVault()">Refresh</button>
        </div>
        <div id=characters><h3 id="current">Current selection: <span id="select">none</span></h3></div>
        <div id="alert"></div>
        <div id="status"></div>
        <div id="vault">
            <div id="Kinetic">
                <div class="equip"></div>
                <div class="inventory"></div>
            </div>
            <div id="Energy">
                <div class="equip"></div>
                <div class="inventory"></div>
            </div>
            <div id="Power">
                <div class="equip"></div>
                <div class="inventory"></div>
            </div>
            <div id="Helmet">
                <div class="equip"></div>
                <div class="inventory"></div>
            </div>
            <div id="Gauntlets">
                <div class="equip"></div>
                <div class="inventory"></div>
            </div>
            <div id="Chest">
                <div class="equip"></div>
                <div class="inventory"></div>
            </div>
            <div id="Legs">
                <div class="equip"></div>
                <div class="inventory"></div>
            </div>
            <div id="Class">
                <div class="equip"></div>
                <div class="inventory"></div>
            </div>
        </div>
    </body>
</html>
